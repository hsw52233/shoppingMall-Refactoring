spring.application.name=shoppingMall
server.port=80

server.servlet.context-path=/shoppingMall
spring.mvc.view.prefix=/WEB-INF/view/
spring.mvc.view.suffix=.jsp

# P6Spy ??? ?? driver? url ??
spring.datasource.driver-class-name=com.p6spy.engine.spy.P6SpyDriver
spring.datasource.url=jdbc:p6spy:mysql://localhost:3306/mall
spring.datasource.username=root
spring.datasource.password=1234

# mybatis mapper location
mybatis.mapper-locations=classpath:com/example/first/mapper/*.xml

# log setting
# P6Spy ?? ??? ?? ?? ?? ?? ?? ? (?? ?? ??)
logging.level.com.example.first=debug
logging.level.com.example.first.controller=debug
logging.level.com.example.first.mapper=info

# multipart setting
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB
